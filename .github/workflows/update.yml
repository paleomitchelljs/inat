name: Refresh iNaturalist data

# Re-pulls observations daily and commits the refreshed JSON. Because Pages is
# served from /docs on the default branch, the commit alone publishes the update.
on:
  schedule:
    - cron: '17 9 * * *'    # daily ~09:17 UTC
  workflow_dispatch:          # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: refresh-inat
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch observations
        run: python3 fetch.py mitchelljs docs/data/observations.json

      - name: Commit if changed
        run: |
          if git diff --quiet -- docs/data/observations.json; then
            echo "No changes to observation data."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/data/observations.json
            git commit -m "data: refresh observations ($(date -u +%Y-%m-%d))"
            git push
          fi
